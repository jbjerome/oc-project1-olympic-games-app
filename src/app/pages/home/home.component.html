<app-top-bar />
@if (loading$ | async) {
  <app-loader />
} @else {
  @if (homeData$ | async; as data) {
    <div class="page-grid">
      <div class="sidebar">
        <app-header [title]="titlePage" [stats]="data.stats" />
      </div>
      <div class="main-content">
        @if (data.countries.length > 0) {
        <app-medal-chart
          [countries]="data.countries"
          [medals]="data.medals"
          [countryIds]="data.countryIds"
          (countryClick)="onCountryClick($event)" />
        } @else {
          <app-empty-state message="No country found" />
        }
      </div>
    </div>
  }
}
